<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding Query Selector</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="queries.js"></script>
</head>
<body>
    <div class="wrapper">
        <div id="container" class="container">
            <section class="unordered">
                <ul id="main-list" class="main_list">
                    <li id="first-mainlist-item" class="main-list-items">Main list item 1</li>
                    <li class="main-list-items">Main list item 2</li>
                    <li class="main-list-items">Main list item 3</li>
                    <li class="main-list-items">Main list item 4</li>
                </ul>
            </section>
            <section class="ordered">
                <ol id="sub_list" class="sub-list">
                    <li id="first-sublist-item" class="sub-list-items">Sub list item 1</li>
                    <li class="sub-list-items">Sub list item 2</li>
                    <li class="sub-list-items">Sub list item 3</li>
                    <li class="sub-list-items">Sub list item 4</li>
                </ol>
            </section>
        </div>
    </div>
</body>
</html>
