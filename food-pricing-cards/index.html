<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <title>Food Pricing Cards</title>
</head>
<body>
    <div class="container">
        <div class="pricing-card">
            <img src="./Food-images/meals/bakedchicken-guacamole-salad.jpg" alt="Baked Chicken Guacamole Salad">
            <div class="card-content">
                <div class="card-header">
                    <h2>Baked Chicken Guacamole Salad
                        <ion-icon class="cart-icon" name="cart-outline"></ion-icon>
                    </h2>
                    <p class="price">$12.99</p>
                </div>
                <p class="description">A delicious and healthy salad with baked chicken and guacamole.</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

        <div class="pricing-card">
            <img src="./Food-images/drinks/lemonade.jpg" alt="Lemonade">
            <div class="card-content">
                <div class="card-header">
                    <h2>Lemonade
                        <ion-icon class="cart-icon" name="cart-outline"></ion-icon>
                    </h2>
                    <p class="price">$2.99</p>
                </div>
                <p class="description">A refreshing and healthy drink with a hint of lemon.</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

        <div class="pricing-card">
            <img src="./Food-images/desserts/dessert_1.jpg" alt="Chocolate covered CheeseCake">
            <div class="card-content">
                <div class="card-header">
                    <h2>Chocolate covered CheeseCake
                        <ion-icon class="cart-icon" name="cart-outline"></ion-icon>
                    </h2>
                    <p class="price">$4.99</p>
                </div>
                <p class="description">A delicious and healthy cheese cake sprinkled with chocolate.</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
